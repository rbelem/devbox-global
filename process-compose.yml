# Devbox service: OmniRoute AI gateway
# Started with: devbox services up omniroute
# Stopped with:  devbox services stop omniroute

# Devbox service: wigolo HTTP daemon (REST + remote MCP on :3333)
# Started with: devbox services up wigolo
# Stopped with:  devbox services stop wigolo

version: "0.5"

processes:
  omniroute:
    command: omniroute --port 20128
    availability:
      restart: "always"
  wigolo:
    command: wigolo serve
    environment:
      - "WIGOLO_LLM_PROVIDER=openai"
      - "WIGOLO_LLM_MODEL=${OPENAI_MODEL}"
      - "LD_LIBRARY_PATH=${PLAYWRIGHT_CHROMIUM_DEPS}/lib"
    availability:
      restart: "always"
